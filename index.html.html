<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>房地产基础知识 · Real Estate Fundamentals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16233F;
    --navy-2:#22335A;
    --paper:#F7F4EA;
    --card:#FFFFFF;
    --brass:#B08D2B;
    --brass-dark:#8A6D1E;
    --line:#E4DFCE;
    --muted:#5B6478;
    --ink:#1B2436;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy);
    color:var(--ink);
    font-family:'Inter','Noto Sans SC',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body.lang-zh .lang-en{display:none;}
  body.lang-en .lang-zh{display:none;}

  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    display:flex;
    flex-direction:column;
  }

  /* ---------- APP BAR ---------- */
  .appbar{
    position:sticky;
    top:0;
    z-index:20;
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
    color:#F3EFE2;
    padding:14px 10px;
    display:flex;
    align-items:center;
    gap:8px;
    border-bottom:2px solid var(--brass);
  }
  .icon-btn{
    width:38px;height:38px;flex:0 0 auto;
    border-radius:999px;
    border:none;
    background:transparent;
    color:#F3EFE2;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    touch-action:manipulation;
  }
  .icon-btn:active{background:rgba(255,255,255,0.12);}
  .icon-btn svg{width:20px;height:20px;}
  .appbar-title{flex:1 1 auto;min-width:0;}
  .at-eyebrow{
    font-size:10.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:600;
    margin:0 0 1px;
  }
  .at-title{
    font-family:'Spectral',serif;
    font-weight:600;
    font-size:17px;
    margin:0;
    color:#FBF9F2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .lang-toggle{
    display:flex;
    border:1px solid rgba(255,255,255,0.22);
    border-radius:8px;
    overflow:hidden;
    flex:0 0 auto;
  }
  .lang-toggle button{
    border:none;
    background:transparent;
    color:#C7CEE2;
    font-size:12px;
    font-weight:600;
    padding:8px 10px;
    cursor:pointer;
    font-family:inherit;
  }
  .lang-toggle button.active{background:var(--brass);color:#241C08;}

  /* ---------- SCREENS ---------- */
  .screen{
    flex:1 1 auto;
    padding:16px 16px 24px;
  }
  .home-sub{
    font-size:13px;
    color:var(--muted);
    margin:0 0 16px;
    line-height:1.6;
  }

  .cat-list{display:flex;flex-direction:column;gap:10px;}
  .cat-row{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:13px 14px;
    text-align:left;
    cursor:pointer;
    font-family:inherit;
    touch-action:manipulation;
  }
  .cat-row:active{border-color:var(--brass);}
  .cat-stamp{
    width:38px;height:38px;flex:0 0 auto;
    border-radius:50%;
    border:2px dashed var(--brass);
    display:flex;align-items:center;justify-content:center;
    font-family:'Spectral',serif;
    font-weight:700;
    font-size:13px;
    color:var(--brass-dark);
    background:#fff;
  }
  .cat-row-body{flex:1 1 auto;min-width:0;}
  .cat-row-title{
    font-family:'Spectral',serif;
    font-weight:600;
    font-size:15px;
    color:var(--ink);
    margin:0 0 2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .cat-row-count{font-size:12px;color:var(--muted);margin:0;}
  .cat-row-chev{flex:0 0 auto;color:var(--brass-dark);width:18px;height:18px;}

  /* ---------- TERM ACCORDION (detail screen) ---------- */
  .term-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    margin-bottom:10px;
    transition:border-color .15s;
  }
  .term-card.open{border-color:var(--brass);}
  .term-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:14px 16px;
    background:transparent;
    border:none;
    cursor:pointer;
    text-align:left;
    font-family:inherit;
    touch-action:manipulation;
  }
  .term-btn .term{
    font-family:'Spectral',serif;
    font-weight:600;
    font-size:15.5px;
    color:var(--navy);
    margin:0;
  }
  body.lang-zh .term-btn .term{font-family:'Noto Sans SC','Inter',sans-serif;}
  .chevron{flex:0 0 auto;width:18px;height:18px;color:var(--brass-dark);transition:transform .2s;}
  .term-card.open .chevron{transform:rotate(180deg);}
  .def-wrap{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .term-card.open .def-wrap{max-height:600px;}
  .def-inner{padding:0 16px 16px;}
  .def-inner .def{
    font-size:13.5px;
    line-height:1.6;
    color:var(--ink);
    margin:0;
    border-top:1px solid var(--line);
    padding-top:12px;
  }
  body.lang-zh .def-inner .def{font-family:'Noto Sans SC','Inter',sans-serif;}

  .detail-lead{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
  }
  .detail-lead .cat-stamp{width:44px;height:44px;font-size:15px;}
  .detail-lead h2{
    font-family:'Spectral',serif;
    font-weight:600;
    font-size:18px;
    margin:0;
    color:var(--ink);
  }
  .detail-lead p{font-size:12px;color:var(--muted);margin:2px 0 0;}

  /* ---------- PAGER ---------- */
  .pager{
    position:sticky;
    bottom:0;
    z-index:15;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:var(--card);
    border-top:1px solid var(--line);
    padding:10px 12px;
  }
  .pager-btn{
    display:flex;
    align-items:center;
    gap:4px;
    background:transparent;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 12px;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    font-family:inherit;
    touch-action:manipulation;
  }
  .pager-btn:disabled{opacity:.35;cursor:default;}
  .pager-btn svg{width:15px;height:15px;}
  .pager-count{
    font-size:12px;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
  }

  /* ---------- SEARCH OVERLAY ---------- */
  .search-overlay{
    position:fixed;
    inset:0;
    z-index:50;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    max-width:480px;
    margin:0 auto;
  }
  .search-bar{
    display:flex;
    align-items:center;
    gap:6px;
    padding:12px;
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
    border-bottom:2px solid var(--brass);
  }
  .search-bar input{
    flex:1 1 auto;
    height:42px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.09);
    color:#FBF9F2;
    padding:0 12px;
    font-size:16px;
    font-family:inherit;
    outline:none;
  }
  .search-bar input::placeholder{color:#9AA3BC;}
  .search-results{flex:1 1 auto;overflow-y:auto;padding:12px 16px;}
  .sr-item{
    width:100%;
    text-align:left;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:8px;
    cursor:pointer;
    font-family:inherit;
    touch-action:manipulation;
  }
  .sr-cat{font-size:11px;color:var(--brass-dark);font-weight:600;margin:0 0 3px;text-transform:uppercase;letter-spacing:.03em;}
  .sr-term{font-family:'Spectral',serif;font-weight:600;font-size:14.5px;color:var(--ink);margin:0 0 3px;}
  body.lang-zh .sr-term{font-family:'Noto Sans SC','Inter',sans-serif;}
  .sr-def{font-size:12.5px;color:var(--muted);margin:0;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .sr-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px;}

  footer{
    text-align:center;
    padding:16px;
    font-size:11px;
    color:var(--muted);
  }
</style>
</head>
<body class="lang-zh">

<div class="app">
  <div class="appbar">
    <button id="backBtn" class="icon-btn" aria-label="back" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="appbar-title">
      <p class="at-eyebrow">FLP Realty</p>
      <h1 class="at-title" id="atTitle">
        <span class="lang-zh">房地产基础知识</span>
        <span class="lang-en">Real Estate Fundamentals</span>
      </h1>
    </div>
    <button id="searchBtn" class="icon-btn" aria-label="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <div class="lang-toggle">
      <button id="btnZh" class="active">中</button>
      <button id="btnEn">EN</button>
    </div>
  </div>

  <div id="homeScreen" class="screen">
    <p class="home-sub lang-zh">团队内部速查手册 · 点击分类查看术语解释</p>
    <p class="home-sub lang-en">Internal quick reference — tap a category to view terms</p>
    <div class="cat-list" id="catList"></div>
  </div>

  <div id="detailScreen" class="screen" style="display:none">
    <div class="detail-lead">
      <div class="cat-stamp" id="detailStamp">01</div>
      <div>
        <h2 id="detailTitle"></h2>
        <p id="detailCount"></p>
      </div>
    </div>
    <div id="detailCards"></div>
  </div>

  <div id="pager" class="pager" style="display:none">
    <button id="prevBtn" class="pager-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="lang-zh">上一类</span><span class="lang-en">Prev</span>
    </button>
    <span class="pager-count" id="pagerCount">01 / 10</span>
    <button id="nextBtn" class="pager-btn">
      <span class="lang-zh">下一类</span><span class="lang-en">Next</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <footer>
    <span class="lang-zh">FLP Realty 团队内部资料 · 仅供团队学习使用</span>
    <span class="lang-en">FLP Realty internal material — for team training use only</span>
  </footer>
</div>

<div id="searchOverlay" class="search-overlay" style="display:none">
  <div class="search-bar">
    <button id="searchCloseBtn" class="icon-btn" aria-label="close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <input id="searchInput" type="text" placeholder="搜索术语…">
  </div>
  <div id="searchResults" class="search-results"></div>
</div>

<script>
const categories = [
{id:"basics", num:"01", zh:"房地产基础知识", en:"Real Estate Fundamentals", items:[
  {zh:"Freehold 永久产权", en:"Freehold",
   zhDef:"永久产权，买家对土地拥有无限期所有权，除非国家有特殊法令，否则不会到期。",
   enDef:"Ownership of the land is permanent with no expiry; the buyer holds the title indefinitely, subject to state laws."},
  {zh:"Leasehold 租赁产权", en:"Leasehold",
   zhDef:"政府将土地以固定年限（通常99年，少数为60年或999年）租给业主，届满后需申请续期，否则土地归还州政府。",
   enDef:"The state leases the land for a fixed term, commonly 99 years (occasionally 60 or 999 years); the title reverts to the state upon expiry unless renewed."},
  {zh:"Residential / Commercial 住宅 / 商用", en:"Residential vs Commercial",
   zhDef:"住宅地契仅限居住用途；商用地契可作商业用途，门牌税（Assessment）通常更高，银行贷款成数也不同。",
   enDef:"Residential title restricts use to dwelling purposes; commercial title allows business use and usually carries higher assessment tax and different loan margins."},
  {zh:"Strata Title 分层地契 / Individual Title 个别地契", en:"Strata Title vs Individual Title",
   zhDef:"分层地契适用于公寓等分层建筑单位，业主共享公共设施；个别地契则用于有独立地段的有地住宅。",
   enDef:"Strata title applies to units within a subdivided building (condos, apartments) where owners share common property; individual title applies to landed properties with a standalone lot."},
  {zh:"Bumiputera Lot 土著地段", en:"Bumiputera Lot",
   zhDef:"法律规定保留给土著购买的单位，通常有折扣价；转售给非土著须向州政府申请解禁（release），过程可能繁琐。",
   enDef:"A unit reserved by law for Bumiputera buyers, usually sold at a discount; resale to non-Bumiputera requires a state authority release, which can be difficult and time-consuming."},
  {zh:"International Lot 国际地段", en:"International Lot",
   zhDef:"不受土著固打限制的单位，任何买家包括外国人都可购买（外国人购买需符合最低门槛价）。",
   enDef:"A unit not restricted by Bumiputera quota, open to all buyers including foreigners, subject to minimum price thresholds for foreign ownership."},
  {zh:"土地面积换算 sqft / sqm", en:"Area Conversion (sqft / sqm)",
   zhDef:"1平方米（sqm）= 10.764平方尺（sqft）。马来西亚房产多用sqft标示，与新加坡/中国客户沟通时常需换算。",
   enDef:"1 square metre (sqm) = 10.764 square feet (sqft). Malaysian listings mostly use sqft; conversion matters with Singapore/China buyers who use sqm."},
  {zh:"Built-up vs Land Size 建筑面积 vs 地皮面积", en:"Built-up vs Land Size",
   zhDef:"建筑面积（Built-up）指实际建筑楼面面积；地皮面积（Land Size）指土地本身大小，主要用于有地住宅估价。",
   enDef:"Built-up area is the actual constructed floor area; land size is the size of the plot itself, relevant mainly for landed properties."},
  {zh:"Dual Key 双钥匙单位", en:"Dual Key",
   zhDef:"一个地契内分隔成两个独立空间，各自有独立门户，适合三代同堂或「自住+出租」双重用途。",
   enDef:"A single title unit split into two separate living spaces with independent entrances, ideal for extended families or dual live-and-rent use."},
  {zh:"SOHO / SOVO / Serviced Apartment", en:"SOHO / SOVO / Serviced Apartment",
   zhDef:"SOHO（小型家居办公室）可住宅兼办公用途；SOVO为商用地契，只能办公不可居住；服务式公寓属住宅地契，以酒店式管理，多作投资出租。",
   enDef:"SOHO allows mixed residential-office use; SOVO is commercial-titled, office-only, no residential use permitted; Serviced Apartments are residential-titled but hotel-style managed, often bought for rental income."}
]},
{id:"process", num:"02", zh:"买房流程", en:"Purchase Process", items:[
  {zh:"Booking 订购", en:"Booking",
   zhDef:"买家支付订金（通常RM1,000–RM5,000或房价的1–3%）以锁定单位与价格，之后才签署买卖合约（SPA）。",
   enDef:"The buyer pays a booking fee (typically RM1,000–RM5,000 or 1–3% of price) to reserve the unit and lock in the price before signing the SPA."},
  {zh:"Loan 申请", en:"Loan Application",
   zhDef:"买家提交收入证明、CCRIS/CTOS报告及申请表格给银行，银行批准（Letter of Offer）通常需2–4周。",
   enDef:"The buyer submits income documents, CCRIS/CTOS reports and application forms to banks; approval (Letter of Offer) usually takes 2–4 weeks."},
  {zh:"SPA 买卖合约", en:"SPA (Sale and Purchase Agreement)",
   zhDef:"买卖合约，买卖双方的法律合约，通常在订购后14–30天内签署，随后需支付10%头期款（扣除已付订金）。",
   enDef:"The core legal contract binding buyer and seller/developer, signed within 14–30 days of booking, followed by the 10% down payment (minus booking fee)."},
  {zh:"Loan Agreement 贷款合约", en:"Loan Agreement",
   zhDef:"贷款批准后与银行签署的正式合约，盖印生效后，银行开始按进度向发展商放款。",
   enDef:"The formal contract with the bank after loan approval, stamped and signed, which triggers the bank to start releasing progressive payments."},
  {zh:"Progressive Payment 分阶段付款", en:"Progressive Payment",
   zhDef:"针对新项目（建筑中），根据SPA附表H/G的建筑进度（如打桩、结构、屋顶等阶段）分阶段付款。",
   enDef:"For new projects under construction, payments are released in stages per Schedule H/G of the SPA, matching construction progress."},
  {zh:"Vacant Possession (VP) 空屋交接", en:"Vacant Possession (VP)",
   zhDef:"发展商将完工单位交给买家的阶段，公寓通常约3年，有地住宅约2–2.5年；须缴清该阶段所有款项才能拿钥匙。",
   enDef:"The developer hands over the completed unit, typically 3 years (condo) or 2–2.5 years (landed) after SPA signing, once all payments are settled."},
  {zh:"Defect Check 验收 / 瑕疵检查", en:"Defect Check",
   zhDef:"在瑕疵责任期内（一般为交房后24个月），买家检查单位并列出瑕疵（裂缝、漏水、设备故障），由发展商免费修复。",
   enDef:"Within the Defect Liability Period (usually 24 months after VP), the buyer reports defects for the developer to fix at no cost."},
  {zh:"拿钥匙 Key Collection", en:"Key Collection",
   zhDef:"完成交房及瑕疵检查/修复后的最后步骤，买家领取钥匙，即可入住或出租单位。",
   enDef:"The final handover step after VP and defect rectification — the buyer collects keys and can move in or rent out the unit."}
]},
{id:"loan", num:"03", zh:"银行贷款知识", en:"Bank Loan Knowledge", items:[
  {zh:"DSR 债务偿还比率", en:"DSR (Debt Service Ratio)",
   zhDef:"每月总负债（现有贷款+新贷款供期）占月总收入的比例；银行一般要求DSR低于60–70%才批准贷款。",
   enDef:"Ratio of total monthly debt commitments to gross monthly income; banks typically require DSR below 60–70% for approval."},
  {zh:"Loan Margin 贷款成数", en:"Loan Margin",
   zhDef:"银行愿意贷出的房价百分比（如90%成数即买家只需付10%头期）；成数依产业类型、价格及信用状况而异。",
   enDef:"The percentage of the property price the bank is willing to finance; margin varies by property type, price and the buyer's credit profile."},
  {zh:"Lock-in Period 锁定期", en:"Lock-in Period",
   zhDef:"通常为3–5年的期限，在此期间提前还清贷款或转贷会被罚款（一般为未偿还贷款额的2–3%）。",
   enDef:"A period (commonly 3–5 years) during which early settlement or refinancing incurs a penalty, usually 2–3% of the outstanding loan."},
  {zh:"Interest Rate / OPR 利率 / 隔夜政策利率", en:"Interest Rate / OPR",
   zhDef:"马来西亚房贷多为浮动利率，以银行的SRR/BR加码计算；SRR会随国家银行（BNM）的隔夜政策利率（OPR）调整而变动。",
   enDef:"Most Malaysian home loans use a floating rate pegged to the bank's SRR/BR, which moves with Bank Negara Malaysia's OPR decisions."},
  {zh:"CCRIS 中央信贷资讯系统", en:"CCRIS",
   zhDef:"由国家银行管理的信贷报告，记录个人在所有银行的贷款与还款记录，银行以此评估申请人信用状况。",
   enDef:"A credit report by Bank Negara Malaysia showing a person's full loan and repayment history across all banks, used to assess creditworthiness."},
  {zh:"CTOS 私营信贷机构", en:"CTOS",
   zhDef:"马来西亚私营信贷报告机构；即使CCRIS记录良好，若CTOS评分不佳（欠费、传票、破产记录）仍可能影响贷款审批。",
   enDef:"A private credit reporting agency; a poor CTOS score from unpaid bills, summons or bankruptcy records can affect loan approval even with clean CCRIS."},
  {zh:"Joint Loan 联名贷款", en:"Joint Loan",

function termCardHTML(it){
  return `
    <div class="term-card">
      <button type="button" class="term-btn">
        <p class="term"><span class="lang-zh">${it.zh}</span><span class="lang-en">${it.en}</span></p>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="def-wrap">
        <div class="def-inner">
          <p class="def"><span class="lang-zh">${it.zhDef}</span><span class="lang-en">${it.enDef}</span></p>
        </div>
      </div>
    </div>`;
}

function bindAccordions(container){
  container.querySelectorAll('.term-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.closest('.term-card').classList.toggle('open');
    });
  });
}

function renderHome(){
  catList.innerHTML = categories.map((cat,i)=>`
    <button type="button" class="cat-row" data-index="${i}">
      <div class="cat-stamp">${cat.num}</div>
      <div class="cat-row-body">
        <p class="cat-row-title"><span class="lang-zh">${cat.zh}</span><span class="lang-en">${cat.en}</span></p>
        <p class="cat-row-count">${cat.items.length} <span class="lang-zh">条术语</span><span class="lang-en">terms</span></p>
      </div>
      <svg class="cat-row-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`).join('');
  catList.querySelectorAll('.cat-row').forEach(row=>{
    row.addEventListener('click', ()=>openDetail(parseInt(row.dataset.index,10)));
  });
}

function openDetail(index, openTermIdx){
  currentIndex = index;
  const cat = categories[index];
  detailStamp.textContent = cat.num;
  detailTitle.innerHTML = `<span class="lang-zh">${cat.zh}</span><span class="lang-en">${cat.en}</span>`;
  detailCount.innerHTML = `${cat.items.length} <span class="lang-zh">条术语</span><span class="lang-en">terms</span>`;
  detailCards.innerHTML = cat.items.map(termCardHTML).join('');
  bindAccordions(detailCards);
  if(typeof openTermIdx === 'number'){
    const card = detailCards.children[openTermIdx];
    if(card) card.classList.add('open');
  }
  homeScreen.style.display = 'none';
  detailScreen.style.display = 'block';
  backBtn.style.display = 'flex';
  pager.style.display = 'flex';
  atTitle.innerHTML = `<span class="lang-zh">${cat.zh}</span><span class="lang-en">${cat.en}</span>`;
  pagerCount.textContent = `${cat.num} / ${String(categories.length).padStart(2,'0')}`;
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === categories.length - 1;
  window.scrollTo({top:0});
}

function goHome(){
  homeScreen.style.display = 'block';
  detailScreen.style.display = 'none';
  backBtn.style.display = 'none';
  pager.style.display = 'none';
  atTitle.innerHTML = `<span class="lang-zh">房地产基础知识</span><span class="lang-en">Real Estate Fundamentals</span>`;
  window.scrollTo({top:0});
}

backBtn.addEventListener('click', goHome);
prevBtn.addEventListener('click', ()=>{ if(currentIndex>0) openDetail(currentIndex-1); });
nextBtn.addEventListener('click', ()=>{ if(currentIndex<categories.length-1) openDetail(currentIndex+1); });

function setLang(lang){
  currentLang = lang;
  document.body.classList.remove('lang-zh','lang-en');
  document.body.classList.add('lang-'+lang);
  document.getElementById('btnZh').classList.toggle('active', lang==='zh');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
  searchInput.placeholder = lang==='zh' ? '搜索术语…' : 'Search terms…';
}
document.getElementById('btnZh').addEventListener('click', ()=>setLang('zh'));
document.getElementById('btnEn').addEventListener('click', ()=>setLang('en'));

function openSearch(){
  searchOverlay.style.display = 'flex';
  searchInput.value = '';
  renderSearchResults('');
  setTimeout(()=>searchInput.focus(), 50);
}
function closeSearch(){
  searchOverlay.style.display = 'none';
}
searchBtn.addEventListener('click', openSearch);
searchCloseBtn.addEventListener('click', closeSearch);

function renderSearchResults(q){
  q = q.trim().toLowerCase();
  if(!q){
    searchResults.innerHTML = `<p class="sr-empty"><span class="lang-zh">输入关键词开始搜索</span><span class="lang-en">Type to search</span></p>`;
    return;
  }
  const results = [];
  categories.forEach((cat,ci)=>{
    cat.items.forEach((it,ii)=>{
      const text = (it.zh+' '+it.en+' '+it.zhDef+' '+it.enDef).toLowerCase();
      if(text.includes(q)) results.push({cat, ci, ii, it});
    });
  });
  if(results.length===0){
    searchResults.innerHTML = `<p class="sr-empty"><span class="lang-zh">没有找到相关术语</span><span class="lang-en">No matching terms found</span></p>`;
    return;
  }
  searchResults.innerHTML = results.map(r=>`
    <button type="button" class="sr-item" data-ci="${r.ci}" data-ii="${r.ii}">
      <p class="sr-cat"><span class="lang-zh">${r.cat.zh}</span><span class="lang-en">${r.cat.en}</span></p>
      <p class="sr-term"><span class="lang-zh">${r.it.zh}</span><span class="lang-en">${r.it.en}</span></p>
      <p class="sr-def"><span class="lang-zh">${r.it.zhDef}</span><span class="lang-en">${r.it.enDef}</span></p>
    </button>`).join('');
  searchResults.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      closeSearch();
      openDetail(parseInt(el.dataset.ci,10), parseInt(el.dataset.ii,10));
      setTimeout(()=>{
        const card = detailCards.children[parseInt(el.dataset.ii,10)];
        if(card) card.scrollIntoView({behavior:'smooth', block:'start'});
      }, 100);
    });
  });
}
searchInput.addEventListener('input', ()=>renderSearchResults(searchInput.value));

renderHome();
</script>
</body>
</html>
